<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock, Paper, Scissors</h1>

    <div class="setup-section">
        <label>Enter Rounds: </label>
        <input type="number" data-ns-test="game-number" min="1" placeholder="e.g. 5">
        <button data-ns-test="play-game">Play</button>
    </div>

    <div class="action-section">
        <button data-ns-test="rock">Rock</button>
        <button data-ns-test="paper">Paper</button>
        <button data-ns-test="scissors">Scissors</button>
    </div>

    <div class="scoreboard">
        <p>Computer Chose: <span data-ns-test="computer-choose"></span></p>
        <p>Round Result: <span data-ns-test="round-result"></span></p>
        <p>Rounds Left: <span data-ns-test="rounds-left">0</span></p>
        <p>User Points: <span data-ns-test="user-points">0</span></p>
        <p>Computer Points: <span data-ns-test="computer-points">0</span></p>
        <hr>
        <h3>Final Result: <span data-ns-test="game-result"></span></h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
